<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="120" fill="url(#bg2)" rx="12"/>
  <rect width="899" height="119" fill="none" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.2" rx="12"/>

  <!-- Step 1: Text -->
  <g transform="translate(20, 20)">
    <rect width="140" height="80" rx="10" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="70" y="22" font-family="monospace" font-size="9" text-anchor="middle" fill="#7c3aed" opacity="0.7">INPUT</text>
    <text x="70" y="42" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle" fill="white" opacity="0.9">"I'm so happy</text>
    <text x="70" y="58" font-family="Georgia, serif" font-size="11" font-style="italic" text-anchor="middle" fill="white" opacity="0.9">today!"</text>
    <text x="70" y="74" font-family="monospace" font-size="8" text-anchor="middle" fill="white" opacity="0.3">plaintext</text>
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Arrow 1 -->
  <line x1="165" y1="60" x2="195" y2="60" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Step 2: AI -->
  <g transform="translate(200, 20)">
    <rect width="140" height="80" rx="10" fill="#ec4899" fill-opacity="0.1" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="70" y="22" font-family="monospace" font-size="9" text-anchor="middle" fill="#ec4899" opacity="0.7">AI MODEL</text>
    <text x="70" y="42" font-size="22" text-anchor="middle">🤖</text>
    <text x="70" y="62" font-family="monospace" font-size="9" text-anchor="middle" fill="#FFD700">joy: 96.1%</text>
    <text x="70" y="74" font-family="monospace" font-size="8" text-anchor="middle" fill="white" opacity="0.3">distilroberta</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="345" y1="60" x2="375" y2="60" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- Step 3: Key -->
  <g transform="translate(380, 20)">
    <rect width="140" height="80" rx="10" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="70" y="22" font-family="monospace" font-size="9" text-anchor="middle" fill="#FFD700" opacity="0.7">KEY DERIVE</text>
    <text x="70" y="42" font-size="22" text-anchor="middle">🔑</text>
    <text x="70" y="60" font-family="monospace" font-size="8" text-anchor="middle" fill="#FFD700" opacity="0.8">SHA256(joy:0.9610)</text>
    <text x="70" y="74" font-family="monospace" font-size="8" text-anchor="middle" fill="white" opacity="0.3">32-byte AES key</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="525" y1="60" x2="555" y2="60" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </line>

  <!-- Step 4: AES -->
  <g transform="translate(560, 20)">
    <rect width="140" height="80" rx="10" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="70" y="22" font-family="monospace" font-size="9" text-anchor="middle" fill="#06b6d4" opacity="0.7">AES-256-CBC</text>
    <text x="70" y="42" font-size="22" text-anchor="middle">🔐</text>
    <text x="70" y="60" font-family="monospace" font-size="8" text-anchor="middle" fill="#06b6d4" opacity="0.8">encrypt(payload, key)</text>
    <text x="70" y="74" font-family="monospace" font-size="8" text-anchor="middle" fill="white" opacity="0.3">iv + ciphertext</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="705" y1="60" x2="735" y2="60" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Step 5: Output -->
  <g transform="translate(740, 20)">
    <rect width="140" height="80" rx="10" fill="#76FF03" fill-opacity="0.1" stroke="#76FF03" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="70" y="22" font-family="monospace" font-size="9" text-anchor="middle" fill="#76FF03" opacity="0.7">OUTPUT</text>
    <text x="70" y="40" font-family="monospace" font-size="8" text-anchor="middle" fill="#76FF03" opacity="0.9">7xK2@mNp...</text>
    <text x="70" y="56" font-family="monospace" font-size="8" text-anchor="middle" fill="white" opacity="0.5">✅ words hidden</text>
    <text x="70" y="70" font-family="monospace" font-size="8" text-anchor="middle" fill="#FFD700" opacity="0.7">✅ emotion saved</text>
  </g>
</svg>
